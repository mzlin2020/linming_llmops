# linming_llmops —— 全栈一键部署编排（基础设施 + 后端 web/worker + 前端 nginx）。
#
# 用法（在仓库根目录执行）：
#   cp deploy/.env.example deploy/.env        # 至少填 JWT_SECRET / AI_SECRET_ENCRYPT_KEY / MYSQL_ROOT_PASSWORD；对话/RAG 填 OPENAI_API_KEY
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
#   docker compose -f deploy/docker-compose.yml ps        # mysql/redis 应为 healthy
#   # 浏览器打开 http://127.0.0.1:8080 （FRONTEND_PORT 可改）
#   bash deploy/smoke-test.sh                              # 端到端冒烟
#
# 说明：backend/celery-worker 镜像默认装本地 ML 嵌入栈（INSTALL_ML=true，约 2GB，首启下载嵌入模型到 hf-cache 卷）。
#       国内构建/下载慢时在 .env 设 HF_ENDPOINT=https://hf-mirror.com、PIP_INDEX_URL/TORCH_INDEX_URL 镜像。
name: linming-llmops

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-linming_llmops}
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      # $$ 转义，使变量在容器内 shell 求值（容器已注入 MYSQL_ROOT_PASSWORD）
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - llmops-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - llmops-net

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    environment:
      # 留空则不开启鉴权；生产建议在 .env 设一个随机串
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    # 说明：qdrant 官方镜像无 shell/curl，容器内 healthcheck 不可靠，
    # 故此处不设 healthcheck，依赖方用 condition: service_started，应用侧连接自带重试。
    networks:
      - llmops-net

  # 后端 API（gunicorn）。启动即迁移（+ 可选 bootstrap account），随后服务。
  backend:
    build:
      context: ../backend
      args:
        INSTALL_ML: "${INSTALL_ML:-true}"
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://pypi.org/simple}"
        TORCH_INDEX_URL: "${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}"
    restart: unless-stopped
    env_file: .env
    environment:
      MODE: api
      MIGRATION_ENABLED: "true"
      FLASK_ENV: ${FLASK_ENV:-production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5001}:5001"
    volumes:
      # 与 celery-worker 共享：web 存上传文件 → worker 读它做切分/向量化（RAG 索引硬前提）
      - storage-data:/app/storage
      # 嵌入模型权重缓存，避免每次重启重复下载
      - hf-cache:/root/.cache/huggingface
    networks:
      - llmops-net

  # Celery worker：知识库索引 / 文档解析 / 会话异步任务。不迁移（由 backend 负责）。
  celery-worker:
    build:
      context: ../backend
      args:
        INSTALL_ML: "${INSTALL_ML:-true}"
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://pypi.org/simple}"
        TORCH_INDEX_URL: "${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}"
    restart: unless-stopped
    env_file: .env
    environment:
      MODE: celery
      MIGRATION_ENABLED: "false"
      FLASK_ENV: ${FLASK_ENV:-production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      # 必须与 backend 同卷同挂载点，否则 worker 看不到 web 上传的文件、且重复下载模型
      - storage-data:/app/storage
      - hf-cache:/root/.cache/huggingface
    networks:
      - llmops-net

  # 前端 SPA（nginx 静态托管 + 反代 /api，含 SSE 不缓冲）。upstream 经 envsubst 注入。
  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:5001}
    depends_on:
      backend:
        condition: service_started
    ports:
      # 绑定地址可配（默认仅本机 127.0.0.1）；远端服务器公网暴露设 FRONTEND_BIND=0.0.0.0
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8080}:80"
    networks:
      - llmops-net

volumes:
  mysql-data:
  redis-data:
  qdrant-data:
  storage-data:
  hf-cache:

networks:
  llmops-net:
    driver: bridge
