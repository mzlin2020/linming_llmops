name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    # MySQL/JWT 连接参数对本 job 所有步骤一致，提到 job 级；各步只覆盖自己独有的库名/服务变量。
    env:
      mysql_server_host: 127.0.0.1
      mysql_server_port: "3306"
      mysql_server_username: root
      mysql_server_password: changeme
      JWT_SECRET: test-secret-please-change
    # 提前接好三件套，Phase 1 的 DB/Redis/Qdrant 集成测试即开即用。
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: changeme
          MYSQL_DATABASE: linming_llmops
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -pchangeme --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      # qdrant 官方镜像无 shell，无法用 --health-cmd；下方用 /readyz 轮询等待。
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333
          - 6334:6334
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:6333/readyz; then echo "qdrant ready"; exit 0; fi
            sleep 2
          done
          echo "qdrant not ready" >&2
          exit 1
      # Phase 2 R5 闸门：迁移链必须能在真实 MySQL 空库自举（SQLite 测不出 JSON 默认/charset 等差异）。
      - name: Verify migrations bootstrap clean MySQL
        working-directory: backend
        env:
          mysql_server_database: linming_llmops_migrate
          FLASK_APP: app.http.app
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -pchangeme \
            -e "CREATE DATABASE IF NOT EXISTS linming_llmops_migrate CHARACTER SET utf8mb4"
          flask db upgrade            # 空库 → 建 account + 25 张 ai_* 表
          flask db downgrade base     # 全部回滚
          flask db upgrade            # 再次自举
      - name: Run pytest
        working-directory: backend
        env:
          mysql_server_database: linming_llmops
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: "6379"
        run: pytest

  frontend:
    name: frontend (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Test
        working-directory: frontend
        run: npm run test
      - name: Build
        working-directory: frontend
        run: npm run build

  # Phase 6 出口闸：用 compose 拉起全栈，跑端到端冒烟脚本到 RAG 检索（本地嵌入，无需付费 key）。
  # SSE-chat 步骤按 OPENAI_API_KEY secret 是否存在自动 skip。此 job 最重（torch 构建 + 全栈），用 buildx 缓存。
  compose-smoke:
    name: compose-smoke (full-stack e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Prepare .env
        working-directory: deploy
        run: |
          cp .env.example .env
          # 注入 CI 测试值（仅本 job 用，绝非生产密钥）
          {
            echo "MYSQL_ROOT_PASSWORD=ci-changeme"
            echo "JWT_SECRET=ci-test-secret-please-change"
            echo "AI_SECRET_ENCRYPT_KEY=ci-test-encrypt-key"
            echo "INSTALL_ML=true"
            echo "FRONTEND_PORT=8080"
            # 若仓库配了 OPENAI_API_KEY secret 则透传（SSE 步骤才会跑），否则留空自动 skip
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
          } >> .env
      - name: Build & start full stack
        run: |
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
      - name: Run smoke test
        run: bash deploy/smoke-test.sh
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env logs --tail=200
      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env down -v
